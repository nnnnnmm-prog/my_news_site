<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% if form.instance.pk %} ✏️  ️Редактировать{% else %} ➕ Добавить{% endif %} новость</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .form-card {
            background: white ;
            border-radius:15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 30px;
            margin-top: 50px;
        }
        .form-card h1{
            color:#333;
            margin-bottom:30px;
            text-align: center;

        }
        .form-card label{
             font-weight: bold;
             margin-bottom:10px;


        }

        .form-card input, .form-card textarea{
            border-radius: 15px;
            border: 1px solid #ddd;
            padding: 10px;
            width: 100% ;

        }
        .form-card input:focus, .form-card textarea:focus{
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-size:18px;
            margin-top: 20px;

        }
        .btn-save:hover{
            transform:scale(1.02);

        }

    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-card">
                    <h1>{% if form.instance.pk %}✏️  Редактировать{% else %}➕ Добавить{% endif %} новость</h1>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-save">Сохранить</button>
                        <a href="{% url 'home' %}" class="btn btn-secondary">Отмена</a>
                    </form>

                </div>
            </div>
        </div>


    </div>
</body>
</html>
