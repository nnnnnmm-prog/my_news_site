<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ news.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height:100vh;
        }
        .news-card{
            background: white;
            border-radius:15px;
            box-shadow:0 20px 40px rgba(0,0,0,0.2);
            padding:20px;
            margin-top:20px;


        }
        .news-image{
            width:100%;
            max-height:400px;
            object-fit:cover;
            border-radius:15px 15px 0 0;


        }

    </style>
</head>
<body>
    <div class="container mt-4">
        <a href="{% url 'home' %}" class="btn btn-light mb-3">← На главную</a>
        {% if news.image %}
            <img src = "{{news.image.url}}" class="news-image" alt = "{{news.title}}">
        {% endif %}
        <div class = "news-card">
            <h1>{{ news.title }}</h1>
            <p class ="text-muted">{{news.created_at|date:"d.m.Y H:i"}}

            </p>
            <p>{{ news.content }}</p>
            <hr>
            <a href = "{% url 'news_update' news.id%}" class ="btn btn-warning">✏️  Редактировать</a>
            <a href="{% url 'news_delete' news.id%}" class = "btn btn-danger">🗑️  Удалить</a>
        </div>


    </div>
</body>
</html>
