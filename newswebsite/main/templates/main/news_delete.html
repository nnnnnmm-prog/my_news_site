<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удаление новости</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;

        }
        .delete-card {
            background:white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            margin-top: 100px;
            text-align: center
        }
        .delete-card h1{
            color: #dc3545;
            font-size: 48px;
            margin-bottom:20px;

        }
        .delete-card .news-title{
            background: #f8f9fa;
            padding:15px;
            border-radius: 10px;
            font-size:20px;
            margin: 20px 0 ;


        }
        .btn-danger{
            background: #dc3545;
            border:none;
            padding:12px 30px;
            margin: 10px;


        }
        .btn-danger:hover{
            background: #c82333;
            transform: scale(1.02);



        }
        .btn-secondary{

            padding:12px 30px;
            margin: 10px;
        }
        .warning-icon{
            font-size:80px;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="delete-card">
                    <div class="warning-icon">⚠️ </div>
                    <h1> Удалить новость?</h1>
                    <p>Вы уверены, что хотите удалить эту новость?</p>
                    <div class="news-title">
                        <strong>«{{ news.title }}»</strong>

                    </div>
                    <p class="text-muted">Это действие нельзя отменить!</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'news_detail' news.id %}" class="btn btn-secondary">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
